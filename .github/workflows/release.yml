# Cross-compile the vhrn CLI for macOS and Linux (arm64/amd64) and attach the raw
# binaries to the GitHub Release for a `vX.Y.Z` tag. scripts/install.sh fetches them
# by `vhrn-<os>-<arch>`, so the asset names are load-bearing. Linux builds are static
# musl (via cross); macOS builds are native per arch. A branch workflow_dispatch runs
# the builds without publishing, to smoke-test the matrix.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: vhrn-darwin-arm64
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-13
            asset: vhrn-darwin-amd64
            cross: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            asset: vhrn-linux-arm64
            cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: vhrn-linux-amd64
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Edition 2024 needs Rust >= 1.85; cross builds with the host toolchain, so
      # this also governs the musl builds.
      - name: Set up Rust (latest stable)
        run: |
          rustup update stable
          rustup default stable

      - name: Add target
        if: ${{ !matrix.cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        uses: taiki-e/install-action@cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Stage asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/vhrn" "dist/${{ matrix.asset }}"

      # Only publish on a tag. Idempotent create tolerates the matrix race and a
      # re-run; --clobber replaces an existing asset.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" --title "$tag" --generate-notes 2>/dev/null || true
          gh release upload "$tag" "dist/${{ matrix.asset }}" --clobber
